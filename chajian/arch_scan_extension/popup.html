<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Arch Scanner</title>
  <style>
    body {
      width: 340px;
      margin: 0;
      padding: 14px;
      font: 13px/1.45 Arial, sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 10px;
    }
    .status {
      padding: 10px;
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    button {
      flex: 1;
      border: 1px solid #b8c4d6;
      background: #fff;
      color: #111827;
      border-radius: 6px;
      padding: 8px;
      cursor: pointer;
    }
    button.primary {
      background: #155eef;
      border-color: #155eef;
      color: #fff;
    }
    button.danger {
      background: #b42318;
      border-color: #b42318;
      color: #fff;
    }
    code {
      display: block;
      overflow-wrap: anywhere;
      background: #eef2f7;
      padding: 6px;
      border-radius: 5px;
      margin-top: 6px;
    }
    .hint {
      color: #64748b;
      font-size: 12px;
    }
    .log {
      white-space: pre-wrap;
      color: #475569;
      font-size: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>Local Architecture Scanner v1.1</h1>
  <div class="status">
    <div><strong>Status:</strong> <span id="enabled">...</span></div>
    <div><strong>Records:</strong> <span id="records">0</span></div>
    <div><strong>Current:</strong><code id="current">...</code></div>
    <div class="hint">Full local capture: requests, WebSockets, storage, plugin messages, and call stacks. Refresh after start.</div>
  </div>

  <div class="row">
    <button id="start" class="primary">Start current origin</button>
    <button id="stop">Stop</button>
  </div>
  <div class="row">
    <button id="export">Export JSON</button>
    <button id="clear" class="danger">Clear</button>
  </div>
  <div class="row">
    <button id="startAll">Start all sites</button>
  </div>
  <div class="hint">“Start all sites” is only for a dedicated test browser profile. Data is stored locally until exported or cleared.</div>
  <div id="log" class="log"></div>
  <script src="popup.js"></script>
</body>
</html>
