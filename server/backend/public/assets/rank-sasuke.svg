  <!-- face -->
  <ellipse cx="64" cy="68" rx="28" ry="26" fill="#fce4c8"/>
  <!-- bangs covering forehead -->
  <path d="M36 55 Q40 48 50 50 Q55 42 64 45 Q73 42 78 50 Q88 48 92 55 L92 60 Q80 54 64 52 Q48 54 36 60 Z" fill="#0d0d1a"/>
  <!-- eyes - Sharingan style -->
  <ellipse cx="50" cy="65" rx="7" ry="5.5" fill="white"/>
  <ellipse cx="78" cy="65" rx="7" ry="5.5" fill="white"/>
  <circle cx="50" cy="65" r="4" fill="#cc0000"/>
  <circle cx="78" cy="65" r="4" fill="#cc0000"/>
  <circle cx="50" cy="65" r="2" fill="#1a0000"/>
  <circle cx="78" cy="65" r="2" fill="#1a0000"/>
  <!-- tomoe marks in sharingan -->
  <circle cx="48" cy="63" r="0.8" fill="#1a0000"/>
  <circle cx="52" cy="63" r="0.8" fill="#1a0000"/>
  <circle cx="50" cy="67" r="0.8" fill="#1a0000"/>
  <circle cx="76" cy="63" r="0.8" fill="#1a0000"/>
  <circle cx="80" cy="63" r="0.8" fill="#1a0000"/>
  <circle cx="78" cy="67" r="0.8" fill="#1a0000"/>
  <!-- stern eyebrows -->
  <path d="M42 58 L54 60" stroke="#0d0d1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M86 58 L74 60" stroke="#0d0d1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M62 70 L64 74 L66 70" stroke="#deb896" stroke-width="1.2" fill="none"/>
  <!-- mouth - slight smirk -->
  <path d="M56 80 Q64 83 72 80" stroke="#c9967a" stroke-width="1.5" fill="none"/>
  <!-- collar -->
  <path d="M40 92 L50 85 L64 95 L78 85 L88 92" stroke="#3d3d6b" stroke-width="3" fill="#2d2d5b"/>
  <!-- lightning effect -->
  <path d="M18 90 L24 82 L20 82 L28 72" stroke="#7ec8e3" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M100 88 L106 78" stroke="#7ec8e3" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
