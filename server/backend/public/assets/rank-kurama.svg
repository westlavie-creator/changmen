<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 9 tails fanned behind -->
  <g opacity="0.7">
    <path d="M64 30 Q30 5 20 25" stroke="#ffb347" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q35 0 28 18" stroke="#ff8c42" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q45 -2 38 12" stroke="#ffb347" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q58 -5 52 8" stroke="#ff8c42" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q70 -5 76 8" stroke="#ffb347" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q83 -2 90 12" stroke="#ff8c42" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q93 0 100 18" stroke="#ffb347" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q98 5 108 25" stroke="#ff8c42" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M64 30 Q64 -8 64 5" stroke="#ffb347" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- face -->
  <ellipse cx="64" cy="68" rx="30" ry="28" fill="#ff9248"/>
  <!-- ears -->
  <polygon points="38,45 28,22 48,40" fill="#ff7b2e"/>
  <polygon points="90,45 100,22 80,40" fill="#ff7b2e"/>
  <polygon points="40,44 32,28 48,40" fill="#ffb87a"/>
  <polygon points="88,44 96,28 80,40" fill="#ffb87a"/>
  <!-- eyes - menacing red -->
  <ellipse cx="51" cy="62" rx="8" ry="6" fill="#1a0000"/>
  <ellipse cx="77" cy="62" rx="8" ry="6" fill="#1a0000"/>
  <ellipse cx="51" cy="62" rx="4" ry="5" fill="#ff0000"/>
  <ellipse cx="77" cy="62" rx="4" ry="5" fill="#ff0000"/>
  <ellipse cx="51" cy="61" rx="2" ry="3" fill="#ff4444"/>
  <ellipse cx="77" cy="61" rx="2" ry="3" fill="#ff4444"/>
  <!-- slit pupils -->
  <rect x="50" y="58" width="2" height="8" rx="1" fill="#1a0000"/>
  <rect x="76" y="58" width="2" height="8" rx="1" fill="#1a0000"/>
  <!-- nose -->
  <ellipse cx="64" cy="73" rx="3" ry="2" fill="#e07030"/>
  <!-- mouth - grin -->
  <path d="M52 79 Q64 88 76 79" stroke="#1a0000" stroke-width="2" fill="none"/>
  <!-- fangs -->
  <polygon points="56,79 58,84 60,79" fill="white"/>
  <polygon points="68,79 70,84 72,79" fill="white"/>
  <!-- whisker marks -->
  <line x1="22" y1="65" x2="42" y2="68" stroke="#e07030" stroke-width="1.5"/>
  <line x1="22" y1="72" x2="42" y2="73" stroke="#e07030" stroke-width="1.5"/>
  <line x1="86" y1="68" x2="106" y2="65" stroke="#e07030" stroke-width="1.5"/>
  <line x1="86" y1="73" x2="106" y2="72" stroke="#e07030" stroke-width="1.5"/>
  <!-- crown/fire effect on top -->
  <text x="64" y="22" text-anchor="middle" font-size="16" fill="#ffd700">&#x1F451;</text>
</svg>
