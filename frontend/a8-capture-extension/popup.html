<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>A8 通信采集</title>
  <style>
    body {
      width: 360px;
      margin: 0;
      padding: 14px;
      font: 13px/1.5 "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 4px;
    }
    .sub {
      color: #64748b;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .status {
      padding: 10px;
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .status div { margin: 4px 0; }
    .row {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    button {
      flex: 1;
      border: 1px solid #b8c4d6;
      background: #fff;
      color: #111827;
      border-radius: 8px;
      padding: 9px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    button.primary {
      background: #155eef;
      border-color: #155eef;
      color: #fff;
      font-weight: 600;
    }
    button.danger {
      background: #b42318;
      border-color: #b42318;
      color: #fff;
    }
    code {
      display: block;
      overflow-wrap: anywhere;
      background: #eef2f7;
      padding: 6px;
      border-radius: 5px;
      margin-top: 4px;
      font-size: 11px;
    }
    .hint {
      color: #64748b;
      font-size: 11px;
      line-height: 1.45;
    }
    .log {
      white-space: pre-wrap;
      color: #475569;
      font-size: 12px;
      min-height: 36px;
      margin-top: 8px;
      padding: 8px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }
    .timer {
      font-size: 18px;
      font-weight: 700;
      color: #155eef;
    }
  </style>
</head>
<body>
  <h1>A8 对外通信采集器</h1>
  <div class="sub">按域名采集：A8（api.a8.to / 中继）+ 全部平台域 · 本地存储</div>

  <div class="status">
    <div><strong>状态：</strong><span id="enabled">...</span></div>
    <div><strong>已记录：</strong><span id="records">0</span> 条</div>
    <div><strong>剩余时间：</strong><span id="remaining" class="timer">—</span></div>
    <div><strong>当前页：</strong><code id="current">...</code></div>
  </div>

  <div class="row">
    <button id="startA8" class="primary">开始 A8 采集（30 分钟）</button>
  </div>
  <div class="hint">
    1. 先登录 A8 控制台（api.a8.to/esport2）<br>
    2. 点击上方按钮 → <strong>刷新页面（F5）</strong><br>
    3. 保持页面打开约 30 分钟，到期自动导出 JSON<br>
    4. 同时会记录 A8 配套插件发起的跨域请求（webRequest）<br>
    5. 仅保留 <strong>A8 域 + 平台域</strong> 流量（Google/CDN 噪声不入库）
  </div>

  <div class="row">
    <button id="finish">立即结束并导出</button>
    <button id="export">仅导出 JSON</button>
  </div>
  <div class="row">
    <button id="start">仅采集当前站点</button>
    <button id="stop">停止</button>
  </div>
  <div class="row">
    <button id="clear" class="danger">清空记录</button>
  </div>

  <div id="log" class="log"></div>
  <script src="popup.js"></script>
</body>
</html>
