<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>平台列表 · 电竞赔率</title>
  <link rel="stylesheet" href="/css/platform-view.css" />
</head>
<body>
  <header>
    <div>
      <nav class="top-nav">
        <a href="/">聚合视图</a>
        <a href="/platforms/" class="active">分平台</a>
        <a href="/console/">控制台</a>
      </nav>
      <h1>平台列表</h1>
    </div>
  </header>
  <main>
    <p class="platform-desc">按 A8 采集模式注册的全平台入口。OB / RAY / PB 已接入 Feed；其余为占位，设置 <code>ENABLE_{平台}=1</code> 后可启动空轮询。</p>
    <div class="hub-grid" id="hub-grid"></div>
  </main>
  <script>
    const MODE_LABEL = {
      http_mqtt: "HTTP + MQTT",
      http_ws: "HTTP + WS",
      http_poll: "HTTP 轮询",
      aggregator_ws: "聚合 WS",
      parse_ws: "解析 + WS",
      plugin_http: "插件 HTTP",
      plugin_graphql_ws: "GraphQL + WS",
    };

    async function loadHub() {
      const grid = document.getElementById("hub-grid");
      const res = await fetch("/api/platforms");
      if (!res.ok) {
        grid.innerHTML = "<p class=\"platform-empty\">无法加载平台列表</p>";
        return;
      }
      const data = await res.json();
      grid.innerHTML = (data.platforms || [])
        .map((p) => {
          const impl = p.implementation === "done" ? "impl-done" : "impl-pending";
          const implText = p.implementation === "done" ? "已接入" : "待接入";
          const enabled = p.enabled ? "运行中" : "未启用";
          const mode = MODE_LABEL[p.collectionMode] || p.collectionMode;
          return `
            <a class="hub-card" href="${p.pagePath}">
              <h2>${p.label} <span class="impl-badge ${impl}">${implText}</span></h2>
              <p>${p.collectionDesc}</p>
              <div class="hub-meta">
                <span>${mode}</span>
                <span>${enabled}</span>
                <span>${p.matchCount || 0} 场</span>
              </div>
            </a>`;
        })
        .join("");
    }
    loadHub();
    setInterval(loadHub, 15000);
  </script>
</body>
</html>
