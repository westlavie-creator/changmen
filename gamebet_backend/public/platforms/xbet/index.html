<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XBet · 实时赔率</title>
  <link rel="stylesheet" href="/css/platform-view.css" />
</head>
<body>
  <header>
    <div>
      <nav class="top-nav">
        <a href="/">聚合视图</a>
        <a href="/platforms/">分平台</a>
        <a href="/console/">控制台</a>
      </nav>
      <h1 id="page-title">XBet · 实时赔率</h1>
      <p id="platform-desc" class="platform-desc" hidden></p>
    </div>
    <div class="status">
      <div class="stream-status" id="stream-status"></div>
      <span class="pill" id="sync-pill">同步 · --</span>
      <span class="pill" id="count-pill">比赛 · 0</span>
    </div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="platform-empty" id="empty" hidden>暂无比赛数据</div>
  </main>
  <div class="bet-overlay" id="bet-overlay" hidden>
    <div class="bet-modal">
      <h3>下单参数</h3>
      <div class="sub" id="bet-sub"></div>
      <pre class="bet-params" id="bet-params"></pre>
      <div class="bet-actions">
        <button type="button" id="bet-close">关闭</button>
      </div>
    </div>
  </div>
  <script>window.PLATFORM_VIEW = { platformId: "XBet" };</script>
  <script src="/vendor/mqtt.min.js"></script>
  <script src="/esport_client.js"></script>
  <script src="/snapshot_runtime.js"></script>
  <script src="/js/platform-view.js"></script>
</body>
</html>
