appId: com.gamebet.app
productName: GameBet
copyright: Copyright © 2026

directories:
  output: ../../dist_electron
  buildResources: host/electron/assets

# 打包进 asar 的文件（相对于 gamebet_backend/）
files:
  - "**/*"
  - "!dist-electron/**"
  - "!node_modules/.cache/**"
  - "!*.bat"
  - "!*.ps1"
  - "!.env"
  - "!.env.*"
  - "!data/esport/**"
  - "!storage/**"
  - "!gamebetdb/**"
  - "!host/electron/assets/**"

# 前端静态文件打包进安装包的 resources/ 目录
extraResources:
  - from: "../gamebet_frontend/app/dist"
    to: "frontend/app/dist"
    filter: ["**/*"]
  - from: "../gamebet_frontend/console"
    to: "frontend/console"
    filter: ["**/*"]

win:
  target:
    - target: nsis
      arch: x64
  icon: host/electron/assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: host/electron/assets/icon.ico
  uninstallerIcon: host/electron/assets/icon.ico
  shortcutName: GameBet

# 打包时自动重编译原生模块（better-sqlite3）
npmRebuild: true
