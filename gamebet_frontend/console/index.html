<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>电竞聚合控制台</title>
  <link rel="stylesheet" href="/esport2/assets/index.css" />
  <style>
    html, body, #app { margin: 0; height: 100%; }
    .boot-hint {
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 24px;
      font-family: "Segoe UI", system-ui, sans-serif;
      line-height: 1.6;
    }
    .boot-hint h1 { font-size: 1.25rem; margin: 0 0 12px; font-weight: 600; }
    .boot-hint p { margin: 0 0 8px; color: #8b98a8; font-size: 0.95rem; }
    .boot-hint code { color: #93c5fd; }
    body.checking #app {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="boot-hint" id="boot-hint">
      <h1>正在加载控制台…</h1>
      <p>首次加载约需 5–10 秒（脚本约 5MB）。</p>
      <p>若长时间停留在此页，请 <strong>Ctrl+Shift+R</strong> 硬刷新，并确认：</p>
      <p>1. 地址为 <code>http://localhost:3456/console/</code>（不是首页 <code>/</code>）</p>
      <p>2. 使用 <strong>Chrome / Edge</strong>，在 <code>chrome://extensions</code> 加载 <code>gamebet_chromeplug</code> 并启用</p>
      <p>3. 扩展 ID 应为 <code>phnhdoaolljdeohmagpngbijbjbiecde</code></p>
      <p>4. 默认账号 <code>admin</code> / <code>admin</code></p>
    </div>
  </div>
  <script>
    window.__gbBootAt = Date.now();
    window.addEventListener("error", function (ev) {
      var hint = document.getElementById("boot-hint");
      if (hint) hint.innerHTML = "<h1>脚本加载失败</h1><p>" + (ev.message || "unknown") + "</p>";
    });
    setTimeout(function () {
      var app = document.getElementById("app");
      if (app && !app.__vue_app__) {
        var hint = document.getElementById("boot-hint");
        if (hint) hint.innerHTML += "<p style=\"color:#fbbf24;margin-top:16px\">超过 15 秒仍未进入登录页：请 Ctrl+Shift+R 硬刷新，或 F12 查看 Console 报错。</p>";
      }
    }, 15000);
  </script>
  <script type="module" src="./index.js?v=css-fix-1"></script>
</body>
</html>
