<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matcher 登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 360px; background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 28px 24px;
    }
    h1 { font-size: 18px; margin-bottom: 6px; color: #f1f5f9; }
    p { font-size: 13px; color: #64748b; margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #475569;
      background: #0f172a; color: #e2e8f0; font-size: 14px; margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f633; }
    button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: #3b82f6; color: #fff; font-size: 14px; cursor: pointer;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { margin-top: 12px; font-size: 13px; color: #f87171; min-height: 18px; }
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1>赛事匹配面板</h1>
    <p>请输入访问密码</p>
    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
    <button type="submit" id="submit-btn">进入</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    (function () {
      const path = window.location.pathname;
      const base = path === '/matcher' || path.startsWith('/matcher/') ? '/matcher' : '';
      const api = base + '/api';
      const home = base ? base + '/' : '/';

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const errEl = document.getElementById('err');
        const password = document.getElementById('password').value;
        errEl.textContent = '';
        btn.disabled = true;
        try {
          const res = await fetch(api + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            errEl.textContent = data.error || '登录失败';
            return;
          }
          window.location.replace(home);
        } catch (err) {
          errEl.textContent = err.message || '网络错误';
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
